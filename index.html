
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartZone — магазин техніки</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#f5f7fb;color:#111}
header{background:#111;color:white;padding:20px}
.container{max-width:1100px;margin:auto;padding:20px}
.hero{padding:40px 0}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.card{background:white;border-radius:12px;padding:15px;box-shadow:0 6px 18px rgba(0,0,0,0.08)}
.card img{width:100%;border-radius:10px}
.price{font-weight:bold;font-size:20px}
button{background:#111;color:white;border:none;padding:10px 14px;border-radius:8px;cursor:pointer}
footer{margin-top:40px;padding:20px;background:#111;color:white;text-align:center}
</style>
</head>
<body>

<header>
<div class="container">
<h1>SmartZone</h1>
<p>Онлайн магазин смартфонів та аксесуарів</p>
</div>
</header>

<section class="hero container">
<h2>Популярні товари</h2>
</section>

<section class="container">
<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1695048133142-1a20484d2569?auto=format&fit=crop&w=800&q=80">
<h3>iPhone 15</h3>
<p class="price">38 999 ₴</p>
<button>Купити</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1610945415295-d9bbf067e59c?auto=format&fit=crop&w=800&q=80">
<h3>Samsung Galaxy S24</h3>
<p class="price">32 999 ₴</p>
<button>Купити</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1598327105666-5b89351aff97?auto=format&fit=crop&w=800&q=80">
<h3>Redmi Note 13 Pro</h3>
<p class="price">14 999 ₴</p>
<button>Купити</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1606220588913-b3aacb4d2f46?auto=format&fit=crop&w=800&q=80">
<h3>AirPods Pro 2</h3>
<p class="price">10 999 ₴</p>
<button>Купити</button>
</div>

</div>
</section>

<footer>
SmartZone © 2026
</footer>

</body>
</html>
